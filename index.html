<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="converter-container">
        <h2>Temperature Converter</h2>
        
        <div class="input-group">
            <label for="degrees">Enter Temperature:</label>
            <input type="number" id="degrees" placeholder="e.g., 0" required>
        </div>

        <div class="input-group">
            <label for="unit">From Unit:</label>
            <select id="unit">
                <option value="celsius">Celsius (°C)</option>
                <option value="fahrenheit">Fahrenheit (°F)</option>
                <option value="kelvin">Kelvin (K)</option>
            </select>
        </div>

        <button id="convert-btn">Convert</button>

        <div class="result-box">
            <h3>Converted Results:</h3>
            <div id="result-display">Enter a value and click convert.</div>
        </div>
    </div>

    <script>
        document.getElementById('convert-btn').addEventListener('click', function() {
            const inputVal = document.getElementById('degrees').value;
            const unit = document.getElementById('unit').value;
            const resultDisplay = document.getElementById('result-display');

            if (inputVal === "") {
                resultDisplay.innerHTML = "<span class='error'>Please enter a valid number!</span>";
                return;
            }

            const temp = parseFloat(inputVal);
            let c, f, k;

            if (unit === "celsius") {
                c = temp;
                f = (c * 9/5) + 32;
                k = c + 273.15;
            } else if (unit === "fahrenheit") {
                f = temp;
                c = (f - 32) * 5/9;
                k = c + 273.15;
            } else if (unit === "kelvin") {
                k = temp;
                c = k - 273.15;
                f = (c * 9/5) + 32;
            }

            resultDisplay.innerHTML = `
                <p><strong>Celsius (°C):</strong> ${c.toFixed(2)}</p>
                <p><strong>Fahrenheit (°F):</strong> ${f.toFixed(2)}</p>
                <p><strong>Kelvin (K):</strong> ${k.toFixed(2)}</p>
            `;
        });
    </script>
</body>
</html>
